name: CI

on:
  push:
    branches: [main, ralph-unified, speckit, superpower, full-vision-roadmap]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-gsd:
    uses: ./.github/workflows/test-worktree.yml
    with:
      worktree-path: .worktrees/full-vision-roadmap
      branch: full-vision-roadmap
      test-command: bun test
      solidity-tests: true

  test-speckit:
    uses: ./.github/workflows/test-worktree.yml
    with:
      worktree-path: .worktrees/speckit
      branch: speckit
      test-command: bun run test
      solidity-tests: true

  test-superpower:
    uses: ./.github/workflows/test-worktree.yml
    with:
      worktree-path: .worktrees/superpower
      branch: superpower
      test-command: bun test --filter chain-contracts --filter chat --filter evaluate-finalize --filter evaluate-retry --filter evaluate-status --filter evaluate-trigger --filter extract --filter judge --filter mastra --filter rate-limit --filter sanitize --filter scorers --filter security-log --filter weights
      solidity-tests: true

  test-ralph:
    uses: ./.github/workflows/test-worktree.yml
    with:
      worktree-path: .worktrees/ralph-unified
      branch: ralph-unified
      test-command: bun run test
