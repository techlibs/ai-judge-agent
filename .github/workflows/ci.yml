name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-gsd:
    uses: ./.github/workflows/test-worktree.yml
    with:
      worktree-path: .worktrees/full-vision-roadmap
      branch: full-vision-roadmap
      test-command: bun test
      solidity-tests: true

  test-speckit:
    uses: ./.github/workflows/test-worktree.yml
    with:
      worktree-path: .worktrees/speckit
      branch: speckit
      test-command: bun run test
      solidity-tests: true

  test-superpower:
    uses: ./.github/workflows/test-worktree.yml
    with:
      worktree-path: .worktrees/superpower
      branch: superpower
      test-command: bun test
      solidity-tests: true

  test-ralph:
    uses: ./.github/workflows/test-worktree.yml
    with:
      worktree-path: .worktrees/ralph-unified
      branch: ralph-unified
      test-command: bun run test
