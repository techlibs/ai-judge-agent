            --set-secrets "OPENAI_API_KEY=OPENAI_API_KEY:latest,PINATA_JWT=PINATA_JWT:latest,PINATA_GATEWAY=PINATA_GATEWAY:latest,AUTH_SECRET=AUTH_SECRET:latest,TURSO_DATABASE_URL=TURSO_DATABASE_URL:latest,TURSO_AUTH_TOKEN=TURSO_AUTH_TOKEN:latest,CRON_SECRET=CRON_SECRET:latest,DEPLOYER_PRIVATE_KEY=DEPLOYER_PRIVATE_KEY:latest,BASE_SEPOLIA_RPC_URL=BASE_SEPOLIA_RPC_URL:latest,DEPLOYMENT_BLOCK=DEPLOYMENT_BLOCK:latest,OPERATOR_PASSWORD=OPERATOR_PASSWORD:latest,BASESCAN_API_KEY=BASESCAN_API_KEY:latest"

      - name: Show deployment URL
        run: |
