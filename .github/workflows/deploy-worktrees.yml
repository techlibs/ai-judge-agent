name: Deploy Worktrees to Cloud Run

on:
  push:
    branches:
      - full-vision-roadmap
      - speckit
      - superpower
      - ralph-unified
  workflow_dispatch:
    inputs:
      worktree:
        description: "Which worktree to deploy (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - gsd
          - speckit
          - superpower
          - ralph

env:
  GCP_PROJECT_ID: ipe-city
  GCP_REGION: us-central1
  GAR_LOCATION: us-central1-docker.pkg.dev
  GAR_REPO: agent-reviewer

jobs:
  deploy-gsd:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/full-vision-roadmap') ||
      (github.event_name == 'workflow_dispatch' && (inputs.worktree == 'all' || inputs.worktree == 'gsd'))
    name: Deploy GSD (full-vision-roadmap)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout worktree branch
        uses: actions/checkout@v4
        with:
          ref: full-vision-roadmap

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install and typecheck
        run: bun install --frozen-lockfile && bun run typecheck

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      - name: Build and push image
        run: |
          BUILD_ID=$(gcloud builds submit --async \
            --tag ${{ env.GAR_LOCATION }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/gsd:${{ github.sha }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(id)')
          echo "Build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status)')
            echo "Status: $STATUS"
            case "$STATUS" in
              SUCCESS) break ;;
              FAILURE|TIMEOUT|CANCELLED|INTERNAL_ERROR|EXPIRED) echo "Build failed: $STATUS"; exit 1 ;;
            esac
            sleep 15
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agent-reviewer-gsd \
            --image ${{ env.GAR_LOCATION }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/gsd:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --no-invoker-iam-check \
            --set-env-vars "NODE_ENV=production,NEXT_PUBLIC_CHAIN_ID=84532,NEXT_PUBLIC_IDENTITY_REGISTRY_ADDRESS=0xDf1ebEe392e6B6AFEE89Fb83CDBF97dA9f8b7B6a,NEXT_PUBLIC_REPUTATION_REGISTRY_ADDRESS=0x0DB2eef99d1Efb3313c6Fe314D137914eCc6FB1f" \
            --set-secrets "OPENAI_API_KEY=OPENAI_API_KEY:latest,PINATA_JWT=PINATA_JWT:latest,PINATA_GATEWAY_URL=PINATA_GATEWAY_URL:latest,DEPLOYER_PRIVATE_KEY=DEPLOYER_PRIVATE_KEY:latest,RPC_URL=RPC_URL:latest,DEPLOYMENT_BLOCK=DEPLOYMENT_BLOCK:latest"

      - name: Show deployment URL
        run: |
          gcloud run services describe agent-reviewer-gsd \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format="value(status.url)"

