name: Test Worktree

on:
  workflow_call:
    inputs:
      worktree-path:
        required: true
        type: string
      branch:
        required: true
        type: string
      test-command:
        required: true
        type: string
      solidity-tests:
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Test (${{ inputs.worktree-path }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout worktree branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          path: ${{ inputs.worktree-path }}
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.22"

      - name: Install dependencies
        run: cd ${{ inputs.worktree-path }} && bun install --frozen-lockfile

      - name: TypeScript check
        run: cd ${{ inputs.worktree-path }} && bun run typecheck

      - name: Run tests
        run: cd ${{ inputs.worktree-path }} && ${{ inputs.test-command }}

      - name: Setup Foundry
        if: inputs.solidity-tests
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Foundry dependencies
        if: inputs.solidity-tests
        run: |
          cd ${{ inputs.worktree-path }}/contracts
          # Hydrate lib/ only when the branch neither tracks it directly
          # nor declares it via git submodules (checkout already fetched
          # submodules when submodules: recursive was used above).
          missing=0
          [ -d lib/forge-std ] && [ -d lib/openzeppelin-contracts ] || missing=1
          if [ "$missing" = "1" ] && [ ! -f .gitmodules ]; then
            # forge install requires a git repo context — create a throwaway one
            if [ ! -d .git ]; then
              git init -q
              git config user.email ci@example.com
              git config user.name ci
              git commit -q --allow-empty -m init
            fi
            rm -rf lib/forge-std lib/openzeppelin-contracts
            forge install foundry-rs/forge-std
            forge install OpenZeppelin/openzeppelin-contracts@v5.6.1
          fi

      - name: Run Solidity tests
        if: inputs.solidity-tests
        run: cd ${{ inputs.worktree-path }}/contracts && forge test -vvv
