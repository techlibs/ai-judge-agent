specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: EvaluationRegistry
    network: base-sepolia
    source:
      abi: EvaluationRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Evaluation
      abis:
        - name: EvaluationRegistry
          file: ../out/EvaluationRegistry.sol/EvaluationRegistry.json
      eventHandlers:
        - event: EvaluationSubmitted(indexed bytes32,indexed bytes32,uint16,uint16,string,string)
          handler: handleEvaluationSubmitted
      file: ./src/mappings.ts
  - kind: ethereum
    name: IdentityRegistry
    network: base-sepolia
    source:
      abi: IdentityRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
        - AgentMetadata
      abis:
        - name: IdentityRegistry
          file: ../out/IdentityRegistry.sol/IdentityRegistry.json
      eventHandlers:
        - event: Registered(indexed uint256,string,indexed address)
          handler: handleRegistered
        - event: URIUpdated(indexed uint256,string,indexed address)
          handler: handleURIUpdated
        - event: MetadataSet(indexed uint256,indexed string,string,bytes)
          handler: handleMetadataSet
      file: ./src/mappings.ts
  - kind: ethereum
    name: MilestoneManager
    network: base-sepolia
    source:
      abi: MilestoneManager
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - FundRelease
      abis:
        - name: MilestoneManager
          file: ../out/MilestoneManager.sol/MilestoneManager.json
      eventHandlers:
        - event: FundReleased(indexed bytes32,uint8,uint256,uint16)
          handler: handleFundReleased
        - event: FundsForwarded(indexed bytes32,uint256,address)
          handler: handleFundsForwarded
        - event: BonusDistributed(indexed bytes32,uint256,uint16)
          handler: handleBonusDistributed
      file: ./src/mappings.ts
  - kind: ethereum
    name: DisputeRegistry
    network: base-sepolia
    source:
      abi: DisputeRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Dispute
        - DisputeVote
      abis:
        - name: DisputeRegistry
          file: ../out/DisputeRegistry.sol/DisputeRegistry.json
      eventHandlers:
        - event: DisputeOpened(indexed uint256,indexed bytes32,indexed address,uint256,string,uint48)
          handler: handleDisputeOpened
        - event: DisputeVoteCast(indexed uint256,indexed address,bool,uint256)
          handler: handleDisputeVoteCast
        - event: DisputeResolved(indexed uint256,uint8,uint16)
          handler: handleDisputeResolved
      file: ./src/mappings.ts
  - kind: ethereum
    name: ReputationRegistry
    network: base-sepolia
    source:
      abi: ReputationRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AgentFeedback
        - FeedbackResponse
      abis:
        - name: ReputationRegistry
          file: ../out/ReputationRegistry.sol/ReputationRegistry.json
      eventHandlers:
        - event: NewFeedback(indexed uint256,indexed address,uint256,uint256,string,string,string,bytes32)
          handler: handleNewFeedback
        - event: FeedbackRevoked(indexed uint256,uint256)
          handler: handleFeedbackRevoked
        - event: FeedbackResponseAppended(indexed uint256,uint256,indexed address,string,bytes32)
          handler: handleFeedbackResponseAppended
      file: ./src/mappings.ts
  - kind: ethereum
    name: ValidationRegistry
    network: base-sepolia
    source:
      abi: ValidationRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Validation
      abis:
        - name: ValidationRegistry
          file: ../out/ValidationRegistry.sol/ValidationRegistry.json
      eventHandlers:
        - event: ValidationRequested(indexed uint256,indexed uint256,indexed address,string)
          handler: handleValidationRequested
        - event: ValidationResponded(indexed uint256,indexed uint256,indexed address,uint8,string,bytes32,string)
          handler: handleValidationResponded
      file: ./src/mappings.ts
